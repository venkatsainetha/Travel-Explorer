<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destinations</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .destinations {
    display: grid;
    grid-template-columns: repeat(2, 1fr); /* 2 columns */
    gap: 20px; /* spacing between items */
    padding: 20px;
}

.destination {
    border: 1px solid #ccc;
    padding: 10px;
    text-align: center;
}

.destination img {
    width: 100%;
    height: auto;
    border-radius: 8px;
}

    </style>
</head>
<body>
    <header>
        <h1>TravIndia-Discover India</h1>
    </header>
    <main class="destinations">
    <div class="destination">
        <h1>Goa</h1>
        <img src="images/goa.jpg" alt="Goa">
        <p>Beach Bliss, Sun, Sand, and Swaying Palms.</p>
        <a href="booking.html" class="button-link">Let's Goa</a>
    </div>

    <div class="destination">
        <h1>Jaipur</h1>
        <img src="images/jaipur.jpg" alt="Jaipur">
        <p>Royal Palaces, Timeless Charm.</p>
        <a href="booking.html" class="button-link">Jai Jaipur</a>
    </div>

    <div class="destination">
        <h1>Ladakh</h1>
        <img src="images/ladakh.jpg" alt="Ladakh">
        <p>Adventure at the Roof of the World</p>
        <a href="booking.html" class="button-link">Love Ladakh</a>
    </div>

    <div class="destination">
        <h1>Manali</h1>
        <img src="images/manali.jpg" alt="Manali">
        <p>Thrills, Chills, and Unforgettable Moments.</p>
        <a href="booking.html" class="button-link">Mana Manali</a>
    </div>
</main>

    <footer>
        <p>&copy; 2024 TravIndia. All rights reserved.</p>
    </footer>
</body>
</html>
