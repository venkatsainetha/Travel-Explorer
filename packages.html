<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packages</title>
    <link rel="stylesheet" href="styles.css">
    <style>

main {
  display: grid;
  grid-template-columns: repeat(2, 1fr); 
  gap: 20px; 
  justify-items: center; 
}

figure {
  text-align: center;
}

figure img {
  width: 100%;
  max-width: 350px;   
  height: 220px;      
  object-fit: cover;  
  border-radius: 8px; 
}

figcaption {
  margin-top: 8px;
  font-size: 0.9rem;
  color: #555;
}
/* Two-column layout for packages */
main {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 25px;
  justify-items: center;
}

.package-card {
  text-align: center;
}

/* Image hover effect */
.image-card {
  position: relative;
  overflow: hidden;
  border-radius: 8px;
}

.image-card img {
  width: 100%;
  max-width: 350px;
  height: 220px;
  object-fit: cover;
  transition: transform 0.3s ease, filter 0.3s ease, box-shadow 0.3s ease;
  display: block;
}

.image-card:hover img {
  transform: scale(1.05);
  filter: blur(2px);
  box-shadow: 0 8px 16px rgba(0,0,0,0.4);
}


.overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #fff;
  font-size: 1.2rem;
  font-weight: bold;
  text-align: center;
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
}

.image-card:hover .overlay {
  opacity: 1;
}


    </style>
</head>
<body>
    <header>
        <h1>TravIndia-Discover India</h1>
    </header>
    <main>
        <figure class="package-card">
            <div class="image-card">
            <img src="images/goa.jpg" alt="Goa beach">
            <div class="overlay">Scenic beach in Goa with palm trees</div>
            </div>
            <h2>4days 5nights</h2>
            <h3>₹5999</h3>
        </figure>
        <figure class="package-card">
            <div class="image-card">
            <img src="images/jaipur.jpg" alt="Jaipur palace">
            <div class="overlay">Royal Palaces, Timeless Charm</div>
            </div>
            <h2>3days 4nights</h2>
            <h3>₹5999</h3>
        </figure>
        <figure class="package-card">
            <div class="image-card">
            <img src="images/ladakh.jpg" alt="Ladakh mountains">
            <div class="overlay">Adventure at the Roof of the World</div>
            </div>
            <h2>2days 3nights</h2>
            <h3>₹5999</h3>
        </figure>
        <figure class="package-card">
            <div class="image-card">
            <img src="images/manali.jpg" alt="Manali hills">
            <div class="overlay">Thrills, Chills, and Unforgettable Moments</div>
            </div>
            <h2>2days 3nights</h2>
            <h3>₹5999</h3>
        </figure>
    </main>
    <footer>
        <p>&copy; 2024 TravIndia. All rights reserved.</p>
    </footer>
</body>
</html>
