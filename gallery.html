<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <link rel="stylesheet" href="styles.css">
    <style>
    main {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px; 
        justify-items: center; 
    }
    main img {
        width: 100%;        
        max-width: 350px;   
        height: 220px;      
        object-fit: cover;  
        border-radius: 8px; 
        }
</style>
</head>
<body>
    <header>
        <h1>TravIndia-Discover India</h1>
    </header>
    <main>
       <img src="images/image1.jpg" alt="Goa">
       <img src="images/image2.jpg" alt="Goa">
       <img src="images/image3.jpg" alt="Jaipur">
       <img src="images/image4.jpg" alt="Jaipur">
       <img src="images/image5.jpg" alt="Ladakh">
       <img src="images/image6.jpg" alt="Ladakh">
       <img src="images/image7.jpg" alt="Manali">
       <img src="images/image8.jpg" alt="Manali">
    </main>
    <footer>
        <p>&copy; 2024 TravIndia. All rights reserved.</p>
    </footer>
</body>
</html>
